<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSS-10 Stress Test - MindCalm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#315273',
                        secondary: '#f3f4f6',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .option-radio:checked + label {
            background-color: #ebf4ff; /* light primary */
            border-color: #315273;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 flex flex-col min-h-screen">

    <header class="bg-white border-b border-gray-200">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-xl font-bold text-primary"><a href="{{ url_for('index') }}">MindCalm PSS-10</a></div>
            <div class="text-sm font-medium text-gray-500">Test in Progress</div>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-2xl w-full">
            <!-- Progress Bar -->
            <div class="mb-8">
                <div class="flex justify-between text-sm font-medium text-gray-500 mb-2">
                    <span>Test Progress</span>
                    <span id="progress-text">1 of 10</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2.5">
                    <div id="progress-bar" class="bg-primary h-2.5 rounded-full" style="width: 10%"></div>
                </div>
            </div>

            <div class="bg-white shadow-xl rounded-2xl border border-gray-100 overflow-hidden">
                <div class="p-8 sm:p-10" id="question-container">
                    <h3 class="text-2xl font-semibold text-slate-900 mb-6 leading-relaxed" id="question-text">
                        Loading...
                    </h3>
                    
                    <form id="test-form" class="space-y-4">
                        <!-- Options will be generated here -->
                        <div id="options-container" class="space-y-3">
                        </div>

                        <div class="pt-6 flex justify-between">
                            <button type="button" id="back-btn" class="hidden px-8 py-3 rounded-lg shadow-sm text-sm font-medium text-gray-700 bg-white border border-gray-300 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors">
                                Back
                            </button>
                            <button type="button" id="next-btn" disabled class="px-8 py-3 rounded-lg shadow-sm text-sm font-medium text-white bg-primary hover:bg-opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary disabled:opacity-50 disabled:cursor-not-allowed transition-colors ml-auto">
                                Next
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script>
        const questions = [
            "In the last month, how often have you been upset because of something that happened unexpectedly?",
            "In the last month, how often have you felt that you were unable to control the important things in your life?",
            "In the last month, how often have you felt nervous and \"stressed\"?",
            "In the last month, how often have you felt confident about your ability to handle your personal problems?",
            "In the last month, how often have you felt that things were going your way?",
            "In the last month, how often have you found that you could not cope with all the things that you had to do?",
            "In the last month, how often have you been able to control irritations in your life?",
            "In the last month, how often have you felt that you were on top of things?",
            "In the last month, how often have you been angered because of things that were outside of your control?",
            "In the last month, how often have you felt difficulties were piling up so high that you could not overcome them?"
        ];

        const options = [
            { text: "Never", value: 0 },
            { text: "Almost never", value: 1 },
            { text: "Sometimes", value: 2 },
            { text: "Fairly often", value: 3 },
            { text: "Very often", value: 4 }
        ];

        let currentStep = 0;
        const answers = [];

        const questionTextElement = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const nextButton = document.getElementById('next-btn');
        const backButton = document.getElementById('back-btn');
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');

        function renderQuestion() {
            // Update Text
            questionTextElement.textContent = `${currentStep + 1}. ${questions[currentStep]}`;
            
            // Render Options
            optionsContainer.innerHTML = '';
            options.forEach((opt, index) => {
                const isSelected = answers[currentStep] === opt.value;
                const circleBorder = isSelected ? 'border-primary' : 'border-gray-300';
                const dotHidden = isSelected ? '' : 'hidden';
                const checkedAttr = isSelected ? 'checked' : '';

                const wrapper = document.createElement('div');
                wrapper.innerHTML = `
                    <input type="radio" name="answer" id="opt-${index}" value="${opt.value}" class="hidden option-radio" ${checkedAttr}>
                    <label for="opt-${index}" class="flex items-center p-4 border border-gray-200 rounded-xl cursor-pointer hover:bg-gray-50 transition-colors">
                        <div class="w-5 h-5 rounded-full border-2 ${circleBorder} mr-4 flex items-center justify-center radio-circle">
                            <div class="w-2.5 h-2.5 rounded-full bg-primary ${dotHidden} radio-dot"></div>
                        </div>
                        <span class="text-gray-700 font-medium">${opt.text}</span>
                    </label>
                `;
                optionsContainer.appendChild(wrapper);
            });

            // Update Progress
            const progressPercent = ((currentStep + 1) / questions.length) * 100;
            progressBar.style.width = `${progressPercent}%`;
            progressText.textContent = `${currentStep + 1} of ${questions.length}`;

            // Update Button Text
            if (currentStep === questions.length - 1) {
                nextButton.textContent = "See Results";
            } else {
                nextButton.textContent = "Next";
            }

            if (answers[currentStep] !== undefined) {
                nextButton.disabled = false;
            } else {
                nextButton.disabled = true;
            }

            if (currentStep > 0) {
                backButton.classList.remove('hidden');
            } else {
                backButton.classList.add('hidden');
            }

            // Add Event Listeners to New Radios
            const radios = document.querySelectorAll('input[name="answer"]');
            radios.forEach(radio => {
                radio.addEventListener('change', () => {
                    nextButton.disabled = false;
                    
                    // Update custom radio UI
                    document.querySelectorAll('.radio-dot').forEach(dot => dot.classList.add('hidden'));
                    document.querySelectorAll('.radio-circle').forEach(circle => circle.classList.replace('border-primary', 'border-gray-300'));
                    
                    if(radio.checked) {
                        const label = radio.nextElementSibling;
                        const circle = label.querySelector('.radio-circle');
                        const dot = label.querySelector('.radio-dot');
                        circle.classList.replace('border-gray-300', 'border-primary');
                        dot.classList.remove('hidden');
                    }
                });
            });
        }

        nextButton.addEventListener('click', () => {
            const selectedOpt = document.querySelector('input[name="answer"]:checked');
            if (selectedOpt) {
                answers[currentStep] = parseInt(selectedOpt.value);
                if (currentStep < questions.length - 1) {
                    currentStep++;
                    renderQuestion();
                } else {
                    // Test Finished - Send to Flask backend
                    nextButton.textContent = "Calculating...";
                    nextButton.disabled = true;

                    fetch("{{ url_for('calculate_score') }}", {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ answers: answers })
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.error) {
                            alert(data.error);
                            nextButton.textContent = "See Results";
                            nextButton.disabled = false;
                        } else if (data.redirect_url) {
                            window.location.href = data.redirect_url;
                        }
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        alert("Failed to connect to the server.");
                        nextButton.textContent = "See Results";
                        nextButton.disabled = false;
                    });
                }
            }
        });

        backButton.addEventListener('click', () => {
            if (currentStep > 0) {
                currentStep--;
                renderQuestion();
            }
        });

        // Initialize
        renderQuestion();
    </script>
</body>
</html>
